name: m8_security_misconfiguration
description:
  'OWASP M8 Security Misconfiguration — Flutter examples from the blog article.
  Demonstrates debug-mode detection, backup hardening, cleartext-traffic
  blocking, certificate pinning, exported-component protection, permission
  minimisation, ATS enforcement, Keychain configuration, Universal Links, secure
  HTTP clients, secure storage, sanitised logging, and runtime configuration
  validation.'
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0-200.1.beta

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # SHA-256 fingerprint calculation for certificate pinning
  crypto: ^3.0.3

  # Secure key-value storage (Keychain on iOS, EncryptedSharedPreferences on Android)
  flutter_secure_storage: ^9.2.4

  # Non-sensitive preferences
  shared_preferences: ^2.3.4

  # Runtime permission requests
  permission_handler: ^11.3.1

  # Deep-link / Universal-link handling
  app_links: ^6.4.0

  # Package metadata (used in runtime config validator)
  package_info_plus: ^8.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
